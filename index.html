<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Limpeza de Texto Avançada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ferramenta para limpar e normalizar textos copiados de qualquer fonte.">
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <div class="container">
        <h1>Limpeza de Texto Avançada</h1>
        <p>Cole aqui seu texto de qualquer fonte. Selecione as opções de limpeza:</p>
        <textarea id="inputText" placeholder="Cole seu texto aqui..." aria-label="Texto de entrada"></textarea>
        <div id="options"></div>
        <button class="btn" onclick="processText()">Limpar Texto</button>
        <h2>Texto Limpo:</h2>
        <pre id="outputText" aria-label="Texto limpo"></pre>
        <button class="btn" onclick="copyOutput()">Copiar Resultado</button>
        <details class="history-block" id="historyAccordion">
            <summary class="history-summary">Histórico <span id="historyCount"></span></summary>
            <div id="history"></div>
        </details>
    </div>

    <footer class="footer">
        Desenvolvido por Thiago Traue ·
        <a href="https://github.com/traue/web-clean-paste" target="_blank" rel="noopener noreferrer">Ver no GitHub</a>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
